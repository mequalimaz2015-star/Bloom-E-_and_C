# 100% FREE TIER ONLY - No Card Required
services:
  # 1. Database (Changed from pserv to web to keep it free)
  - type: web
    name: bloom-db
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile.mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: bloom_root_pass
      - key: MYSQL_DATABASE
        value: bloom_africa

  # 2. Application (Free Web Service)
  - type: web
    name: bloom-web
    env: docker
    plan: free
    envVars:
      - key: BLOOM_DB_HOST
        fromService:
          type: web
          name: bloom-db
          property: host
      - key: BLOOM_DB_NAME
        value: bloom_africa
      - key: BLOOM_DB_USER
        value: root
      - key: BLOOM_DB_PASS
        value: bloom_root_pass

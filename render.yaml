services:
  # Web Service for the PHP Application
  - type: web
    name: bloom-restaurant
    env: docker
    plan: free 
    region: oregon 
    envVars:
      - key: BLOOM_DB_HOST
        fromService:
          type: pserv
          name: bloom-mysql
          property: host
      - key: BLOOM_DB_NAME
        value: bloom_africa
      - key: BLOOM_DB_USER
        value: root
      - key: BLOOM_DB_PASS
        value: bloom_root_pass
      - key: BLOOM_DB_PORT
        value: "3306"
    # Uncomment the disk section if you upgrade to a paid 'starter' plan
    # to maintain persistent image uploads
    # disk:
    #   name: uploads
    #   mountPath: /var/www/html/uploads
    #   sizeGB: 1

  # Private MySQL Service (Background only)
  - type: pserv
    name: bloom-mysql
    env: docker
    plan: free
    region: oregon
    dockerContext: .
    dockerfilePath: Dockerfile.mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: bloom_root_pass
      - key: MYSQL_DATABASE
        value: bloom_africa

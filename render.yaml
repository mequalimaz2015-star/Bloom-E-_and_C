services:
  # 1. Web Service (The PHP Application)
  - type: web
    name: bloom-restaurant
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: BLOOM_DB_HOST
        fromService:
          type: pserv
          name: bloom-mysql
          property: host
      - key: BLOOM_DB_NAME
        value: bloom_africa
      - key: BLOOM_DB_USER
        value: root
      - key: BLOOM_DB_PASS
        value: bloom_root_pass
      - key: BLOOM_DB_PORT
        value: "3306"

  # 2. Private MySQL Service (Using standard image for better stability)
  - type: pserv
    name: bloom-mysql
    env: image
    image: mysql:8.0
    plan: free
    region: oregon
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: bloom_root_pass
      - key: MYSQL_DATABASE
        value: bloom_africa

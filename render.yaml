version: 1
name: Bloom E and C
services:
  - type: web
    name: bloom-africa-app
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: BLOOM_DB_HOST
        value: "bloom-db"
      - key: BLOOM_DB_NAME
        value: "bloom_africa"
      - key: BLOOM_DB_USER
        value: "root"
      - key: BLOOM_DB_PASS
        value: "bloom_root_pass"
      - key: BLOOM_DB_PORT
        value: "3306"

  - type: web
    name: bloom-db
    env: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile.mysql
    envVars:
      - key: MYSQL_DATABASE
        value: "bloom_africa"
      - key: MYSQL_ROOT_PASSWORD
        value: "bloom_root_pass"

services:
  - type: pserv
    name: bloom-db
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: bloom_root_pass
      - key: MYSQL_DATABASE
        value: bloom_africa

  - type: web
    name: bloom-web
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: BLOOM_DB_HOST
        fromService:
          type: pserv
          name: bloom-db
          property: host
      - key: BLOOM_DB_NAME
        value: bloom_africa
      - key: BLOOM_DB_USER
        value: root
      - key: BLOOM_DB_PASS
        value: bloom_root_pass

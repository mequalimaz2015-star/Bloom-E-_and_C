name: bloom-africa
services:
  - type: pserv
    name: bloom-db
    env: image
    image: mysql:5.7
    plan: free
    region: oregon
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: bloom_root_pass
      - key: MYSQL_DATABASE
        value: bloom_africa

  - type: web
    name: bloom-web
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: BLOOM_DB_HOST
        fromService:
          type: pserv
          name: bloom-db
          property: host
      - key: BLOOM_DB_NAME
        value: bloom_africa
      - key: BLOOM_DB_USER
        value: root
      - key: BLOOM_DB_PASS
        value: bloom_root_pass
      - key: BLOOM_DB_PORT
        value: "3306"

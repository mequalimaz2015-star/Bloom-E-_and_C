services:
  - type: web
    name: bloom-restaurant
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /
    envVars:
      - key: BLOOM_DB_HOST
        value: mysql
      - key: BLOOM_DB_NAME
        value: bloom_africa
      - key: BLOOM_DB_USER
        value: bloom_user
      - key: BLOOM_DB_PASS
        value: bloom_password

  - type: pvt
    name: mysql
    env: docker
    region: ohio
    plan: free
    dockerFilePath: Dockerfile.mysql
    envVars:
      - key: MYSQL_DATABASE
        value: bloom_africa
      - key: MYSQL_USER
        value: bloom_user
      - key: MYSQL_PASSWORD
        value: bloom_password
      - key: MYSQL_ROOT_PASSWORD
        value: root_password
